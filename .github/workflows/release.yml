name: Release

on:
  push:
    tags:
      - 'v*.merge.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must match v*.merge.*; e.g., v1.0.0.merge.0)'
        required: true
        type: string
      simple_release:
        description: 'Simple release: only x86_64 GHCR image, skip other artifacts'
        required: false
        type: boolean
        default: false

# зОѓеҐГеПШйЗПпЉЪеРИеєґ workflow_dispatch иЊУеЕ•еТМ repository variable
# tag push иІ¶еПСжЧґиѓїеПЦ vars.SIMPLE_RELEASEпЉМworkflow_dispatch жЧґдљњзФ®иЊУеЕ•еПВжХ∞
env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
  SIMPLE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.simple_release == 'true' || github.event_name != 'workflow_dispatch' && vars.SIMPLE_RELEASE == 'true' }}

permissions:
  contents: write
  packages: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_identity.outputs.release_sha }}
      release_tag: ${{ steps.release_identity.outputs.release_tag }}
      tag_message: ${{ steps.release_identity.outputs.tag_message }}
    steps:
      - name: Validate workflow_dispatch tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG="$INPUT_TAG"
          case "$TAG" in
            v*.merge.*) ;;
            *)
              echo "workflow_dispatch tag must match v*.merge.*"
              exit 1
              ;;
          esac

          EXPECTED_REF="refs/tags/${TAG}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ] || [ "${GITHUB_REF}" != "${EXPECTED_REF}" ]; then
            echo "workflow_dispatch must run from ${EXPECTED_REF}"
            exit 1
          fi

      - name: Checkout validated release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Capture release identity
        id: release_identity
        run: |
          RELEASE_SHA=$(git rev-parse HEAD)
          if [ "${RELEASE_SHA}" != "${GITHUB_SHA}" ]; then
            echo "validated release ref drifted from event sha"
            echo "release ref sha: ${RELEASE_SHA}"
            echo "event sha: ${GITHUB_SHA}"
            exit 1
          fi

          TAG_MESSAGE=$(git for-each-ref --format='%(contents)' "$RELEASE_REF")

          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          DELIM="TAG_MESSAGE_$(date +%s)_$$"
          echo "tag_message<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$TAG_MESSAGE" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

  # Update VERSION file with tag version
  update-version:
    needs: validate-tag
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG_FROZEN: ${{ needs.validate-tag.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.release_sha }}

      - name: Update VERSION file
        run: |
          VERSION="$RELEASE_TAG_FROZEN"
          VERSION=${VERSION#v}
          echo "$VERSION" > backend/cmd/server/VERSION
          echo "Updated VERSION file to: $VERSION"

      - name: Upload VERSION artifact
        uses: actions/upload-artifact@v7
        with:
          name: version-file
          path: backend/cmd/server/VERSION
          retention-days: 1

  build-frontend:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-tag.outputs.release_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 1

  release:
    needs: [validate-tag, update-version, build-frontend]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG_FROZEN: ${{ needs.validate-tag.outputs.release_tag }}
      RELEASE_SHA_FROZEN: ${{ needs.validate-tag.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate-tag.outputs.release_sha }}

      - name: Download VERSION artifact
        uses: actions/download-artifact@v8
        with:
          name: version-file
          path: backend/cmd/server/

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: backend/internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'

      # Docker setup for GoReleaser
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner for GHCR
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Verify frozen tag still points to frozen sha
        run: |
          REMOTE_SHA=$(git ls-remote origin "refs/tags/${RELEASE_TAG_FROZEN}" "refs/tags/${RELEASE_TAG_FROZEN}^{}" | awk 'END{print $1}')
          if [ -z "$REMOTE_SHA" ]; then
            echo "release tag ${RELEASE_TAG_FROZEN} is missing on origin"
            exit 1
          fi
          if [ "$REMOTE_SHA" != "$RELEASE_SHA_FROZEN" ]; then
            echo "release tag ${RELEASE_TAG_FROZEN} drifted from frozen sha"
            echo "remote sha: ${REMOTE_SHA}"
            echo "frozen sha: ${RELEASE_SHA_FROZEN}"
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=validate ${{ env.SIMPLE_RELEASE == 'true' && '--config=.goreleaser.simple.yaml' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ needs.validate-tag.outputs.tag_message }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG_FROZEN }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'skip' }}

      # Update DockerHub description
      - name: Update DockerHub description
        if: ${{ env.SIMPLE_RELEASE != 'true' && env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sub2api
          short-description: "Sub2API - AI API Gateway Platform"
          readme-filepath: ./deploy/DOCKER.md

      # Send Telegram notification
      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG_MESSAGE_RAW: ${{ needs.validate-tag.outputs.tag_message }}
          RELEASE_TAG_FROZEN: ${{ needs.validate-tag.outputs.release_tag }}
        continue-on-error: true
        run: |
          # ж£АжЯ•ењЕи¶БзЪДзОѓеҐГеПШйЗП
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          TAG_NAME="$RELEASE_TAG_FROZEN"
          VERSION=${TAG_NAME#v}
          REPO="${{ github.repository }}"
          GHCR_IMAGE="ghcr.io/${REPO,,}"  # ${,,} converts to lowercase

          # иОЈеПЦ tag message еЖЕеЃєеєґиљђдєЙ Markdown зЙєжЃКе≠Чзђ¶
          TAG_MESSAGE="$TAG_MESSAGE_RAW"
          TAG_MESSAGE=$(echo "$TAG_MESSAGE" | sed 's/\([_*`\[]\)/\\\1/g')

          # йЩРеИґжґИжБѓйХњеЇ¶пЉИTelegram жґИжБѓйЩРеИґ 4096 е≠Чзђ¶пЉМйҐДзХЩз©ЇйЧізїЩе§іе∞ЊеЫЇеЃЪеЖЕеЃєпЉЙ
          if [ ${#TAG_MESSAGE} -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          # жЮДеїЇжґИжБѓеЖЕеЃє
          MESSAGE="рЯЪА *Sub2API жЦ∞зЙИжЬђеПСеЄГпЉБ*"$'\n'$'\n'
          MESSAGE+="рЯУ¶ зЙИжЬђеПЈ: \`${VERSION}\`"$'\n'$'\n'

          # жЈїеК†жЫіжЦ∞еЖЕеЃє
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi

          MESSAGE+="рЯР≥ *Docker йГ®зљ≤:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          # ж†єжНЃжШѓеР¶йЕНзљЃ DockerHub еК®жАБзФЯжИР
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/sub2api"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${VERSION}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${VERSION}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="рЯФЧ *зЫЄеЕ≥йУЊжО•:*"$'\n'
          MESSAGE+="вАҐ [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            MESSAGE+="вАҐ [Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="вАҐ [GitHub Packages](https://github.com/${REPO}/pkgs/container/sub2api)"$'\n'$'\n'
          MESSAGE+="#Sub2API #Release #${TAG_NAME//./_}"

          # еПСйАБжґИжБѓ
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"

  sync-version-file:
    needs: [release, validate-tag]
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG_FROZEN: ${{ needs.validate-tag.outputs.release_tag }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync VERSION file to released tag
        run: |
          VERSION="$RELEASE_TAG_FROZEN"
          VERSION=${VERSION#v}

          CURRENT_VERSION=$(tr -d '\r\n' < backend/cmd/server/VERSION || true)
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "VERSION file already matches $VERSION"
            exit 0
          fi

          echo "$VERSION" > backend/cmd/server/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/cmd/server/VERSION
          git commit -m "chore: sync VERSION to ${VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
